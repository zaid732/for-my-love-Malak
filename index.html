<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة لـ مَلك</title>
    <style>
        body { background-color: #ffe5ec; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; direction: rtl; text-align: center; }
        .box { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(255,105,180,0.3); width: 85%; max-width: 350px; display: none; }
        .box.active { display: block; }
        img { width: 100%; max-width: 220px; border-radius: 20px; margin-bottom: 15px; }
        button { background: #ff758f; color: white; border: none; padding: 12px 25px; border-radius: 15px; cursor: pointer; font-size: 16px; margin: 5px; transition: 0.3s; }
    </style>
</head>
<body>

<div id="s1" class="box active">
    <img src="img1.jpg">
    <h2>هلو مَلك 💖</h2>
    <button onclick="next('s2')">هلوو</button>
</div>

<div id="s2" class="box">
    <img src="img2.jpg">
    <h2>مَلك عندي سؤال إلك 🫣</h2>
    <button onclick="next('s3')">إيش هوو؟</button>
</div>

<div id="s3" class="box">
    <img src="img3.jpg">
    <h2>مستحي أسألك إياه.. 🥺</h2>
    <button onclick="next('s4')">اسألني</button>
</div>

<div id="s4" class="box">
    <img src="img4.jpg">
    <h2>بتحبيني؟</h2>
      <button onclick="next('s4')">هاا؟</button>
    <button onclick="alert('شنو هاا؟ تحبين زيد لو لا؟')">هاا</button>
    <button onclick="next('s5')">مدري</button>
</div>

<div id="s5" class="box">
    <h2>لو بتحبي زيد اكبسي عالقلب 🥹👉🏻</h2>
    <button style="font-size: 40px;" onclick="next('s6')">❤️</button>
</div>

<div id="s6" class="box">
    <h2>كل عام وانتي أقرب إنسانة لقلبي و يا عمري خليكي دايما سعيدة لانه انا سعادتي لما شوف ضحكتك و بساعدتك 💖</h2>
    <audio id="audio" controls>
        <source src="https://dl.musicdel.ir/Music/1402/09/Nancy%20Ajram%20-%20Ya%20Kethar.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    function next(id) {
        document.querySelector('.box.active').classList.remove('active');
        document.getElementById(id).classList.add('active');
        if(id == 's6') document.getElementById('audio').play();
    }
</script>
</body>
</html>
