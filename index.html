<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لـ مَلك 💖</title>
    <style>
        body { background-color: #ffe5ec; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; direction: rtl; text-align: center; }
        .box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 90%; max-width: 320px; display: none; }
        .box.active { display: block; }
        img { width: 100%; max-width: 200px; height: 200px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
        button { background: #ff758f; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 16px; margin: 5px; }
    </style>
</head>
<body>

<div id="s1" class="box active">
    <img src="img1.png" onerror="this.style.display='none'">
    <h2>هلو مَلك 💖</h2>
    <button onclick="next('s2')">هلوو</button>
</div>

<div id="s2" class="box">
    <img src="img2.png" onerror="this.style.display='none'">
    <h2>مَلك عندي سؤال إلك 🫣</h2>
    <button onclick="next('s3')">إيش هوو؟</button>
</div>

<div id="s3" class="box">
    <img src="img3.png" onerror="this.style.display='none'">
    <h2>مستحي أسألك إياه.. 🥺</h2>
    <button onclick="next('s4')">اسألني</button>
</div>

<div id="s4" class="box">
    <img src="img4.png" onerror="this.style.display='none'">
    <h2>تحبين زيد لو لا؟</h2>
    <button onclick="alert('شنو هاا؟ تحبين زيد لو لا؟')">هاا</button>
    <button onclick="next('s5')">مدري</button>
    <button onclick="alert('مافي خيار ثالث! 😂')">خيار ثالث</button>
</div>

<div id="s5" class="box">
    <h2>لو تحبين زيد اكبسي عالقلب 🥹👉🏻</h2>
    <button style="font-size: 40px;" onclick="next('s6')">❤️</button>
</div>

<div id="s6" class="box">
    <h2>كل عام وانتي أقرب انسانة لقلبي 💖</h2>
    <audio id="audio" controls>
        <source src="https://dl.musicdel.ir/Music/1402/09/Nancy%20Ajram%20-%20Ya%20Kethar.mp3" type="audio/mpeg">
    </audio>
    <p style="font-size: 12px; color: gray;">(اضغطي زر التشغيل إذا ما اشتغلت تلقائياً)</p>
</div>

<script>
    function next(id) {
        document.querySelector('.box.active').classList.remove('active');
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
